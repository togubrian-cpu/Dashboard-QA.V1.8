

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quality - Full Screen TV</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        h2 { 
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 100;
            color: #f2f2f2;
            letter-spacing: 2px;
            font-weight: 300;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 5px;
        }

        .dashboard-content {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease-in-out;
        }

        .tab-panel.active {
            opacity: 1;
            visibility: visible;
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: lime;
            width: 0%;
            z-index: 200;
        }
    </style>
</head>

    </div>

    <div class="progress-bar" id="progressBar"></div>

</div>

<script>
    let currentSlide = 0;
    const totalSlides = 7;
    const intervalTime = 35000;

    const panels = document.getElementsByClassName("tab-panel");
    const progressBar = document.getElementById("progressBar");

    let slideInterval;
    let progressStartTime;
    let remainingTime = intervalTime;
    let isPaused = false;
    let resumeTimeout;

    function showSlide(index) {
        for (let i = 0; i < panels.length; i++) {
            panels[i].classList.remove("active");
        }
        panels[index].classList.add("active");
    }

    function nextSlide() {
        remainingTime = intervalTime;
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
        startProgressBar();
    }

    function startProgressBar() {
        progressBar.style.transition = "none";
        progressBar.style.width = "0%";

        setTimeout(() => {
            progressBar.style.transition = `width ${remainingTime}ms linear`;
            progressBar.style.width = "100%";
        }, 50);

        progressStartTime = Date.now();

        clearInterval(slideInterval);
        slideInterval = setInterval(nextSlide, remainingTime);
    }

    function pauseSlider() {
        if (isPaused) return;
        isPaused = true;

        clearInterval(slideInterval);

        const elapsed = Date.now() - progressStartTime;
        remainingTime = remainingTime - elapsed;

        const computedWidth = window.getComputedStyle(progressBar).width;
        progressBar.style.transition = "none";
        progressBar.style.width = computedWidth;
    }

    function resumeSlider() {
        if (!isPaused) return;
        isPaused = false;
        startProgressBar();
    }

    function resetResumeTimer() {
        pauseSlider();

        clearTimeout(resumeTimeout);
        resumeTimeout = setTimeout(() => {
            remainingTime = intervalTime;
            resumeSlider();
        }, 10000);
    }

    document.addEventListener("mousemove", resetResumeTimer);
    document.addEventListener("click", resetResumeTimer);
    document.addEventListener("keydown", resetResumeTimer);

    showSlide(currentSlide);
    startProgressBar();

    // Auto refresh tiap 10 menit
    setInterval(() => {
        location.reload();
    }, 600000);
</script>

</body>
