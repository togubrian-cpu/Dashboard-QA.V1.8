<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quality - Full Screen TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h2 { 
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 100;
            color: #f2f2f2; 
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 5px;
            pointer-events: none;
        }

        .dashboard-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .tab-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out;
        }

        .tab-panel.active {
            opacity: 1;
            visibility: visible;
            z-index: 1;
            animation: fadeInScale 1.5s ease-in-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(1.005); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h2>Dashboard Quality</h2>

    <div class="dashboard-content">
        <div id="slide0" class="tab-panel active">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=d5a79356a4b7dddb3b12"></iframe>
        </div>

        <div id="slide1" class="tab-panel">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=c59f9a2c316249ebc41d"></iframe>
        </div>

        <div id="slide2" class="tab-panel">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=71056e5434aeae55990d"></iframe>
        </div>

        <div id="slide3" class="tab-panel">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=6af54b18951d5ce9bb6c"></iframe>
        </div>

        <div id="slide4" class="tab-panel">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=9b351f8381ea904cc214"></iframe>
        </div>

        <div id="slide5" class="tab-panel">
            <iframe src="https://app.powerbi.com/view?r=eyJrIjoiNmQ0ZjJmM2UtNjI4Ny00MTAwLWFjMDktNTVmZDc1YWUxZTA0IiwidCI6IjI5ZTZhYTNhLTljZTItNDVmYS1iYjZhLWZlYWUwMDU2NjVhZiIsImMiOjEwfQ%3D%3D&pageName=e1744970a0e90b704012"></iframe>
        </div>
    </div>

    <script>
        // === SLIDE ROTATION ===
        let currentSlide = 0;
        const totalSlides = 6;
        const intervalTime = 20000;

        function nextSlide() {
            const panels = document.getElementsByClassName("tab-panel");
            panels[currentSlide].classList.remove("active");
            currentSlide = (currentSlide + 1) % totalSlides;
            panels[currentSlide].classList.add("active");
        }

        setInterval(nextSlide, intervalTime);


        // === 🔥 ANTI IDLE (WAJIB) ===
        setInterval(() => {
            window.dispatchEvent(new Event('mousemove'));
            window.dispatchEvent(new Event('mousedown'));
            window.dispatchEvent(new Event('keydown'));
            console.log("Keep Alive");
        }, 30000);


        // === 🔄 FORCE FOCUS ===
        setInterval(() => {
            window.focus();
        }, 10000);


        // === 🔁 AUTO REFRESH ===
        setInterval(() => {
            location.reload();
        }, 1800000);
    </script>

</body>
</html>
